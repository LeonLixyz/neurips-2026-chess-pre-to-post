# C_total=6.5e18, alpha=0.400
# Model: ~20M (20.5M params)
# Architecture: n_layer=6, n_embed=512, n_head=4, kv_heads=4, head_dim=128, intermediate=1536
# Pretrain tokens: 21,139,210,000 (18430 shards, 18428 train + 2 eval)
# Estimated steps: ~645117

model:
  architecture: "Qwen/Qwen3-0.6B"
  block_size: 1024
  n_layer: 6
  n_head: 4
  num_key_value_heads: 4
  head_dim: 128
  n_embed: 512
  intermediate_size: 1536
  dropout: 0.0

training:
  device: "cuda"
  batch_size: 32
  gradient_accumulation_steps: 2
  epochs: 1
  experiment_name: "20m_C_6p5e18_alpha0.400"
  optimizer:
    name: adamw
    lr: 1e-3
    weight_decay: 0.1
    betas: [0.9, 0.95]
  scheduler:
    name: cosine
    eta_min: 1e-4
    warmup_ratio: 0.05
  max_grad_norm: 1.0
  log_interval: 10
  num_workers: 8
  save_dir: "checkpoints"

data:
  txt_path: "/data/pretrain_v1_20b"
  pretrain_tokens: 21139210000
  eval_holdout: 2

tokenizer:
  name: "LanTokenizer"
  special_tokens: ["<bos>", "<eos>", "<pad>"]
  include_move_numbers: false

logging:
  backend: "wandb"
  entity: ""  # set your WandB entity here, or pass WANDB_ENTITY
  project: "chess-scaling-C_6p5e18"
  notes: "C=6.5e18 alpha=0.400 20m"
  tags: ["C_6p5e18", "alpha0.400", "20m"]
  mode: "online"
  hf_upload_repo: "chess-pre-to-post/20m_C_6p5e18_alpha0.400"
