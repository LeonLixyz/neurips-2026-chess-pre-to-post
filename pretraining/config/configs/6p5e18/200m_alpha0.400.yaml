# C_total=6.5e18, alpha=0.400
# Model: ~200M (203.7M params)
# Architecture: n_layer=22, n_embed=768, n_head=12, kv_heads=8, head_dim=128, intermediate=2304
# Pretrain tokens: 2,138,008,000 (1864 shards, 1862 train + 2 eval)
# Estimated steps: ~65246

model:
  architecture: "Qwen/Qwen3-0.6B"
  block_size: 1024
  n_layer: 24
  n_head: 12
  num_key_value_heads: 4
  head_dim: 128
  n_embed: 768
  intermediate_size: 2304
  dropout: 0.0

training:
  device: "cuda"
  batch_size: 32
  gradient_accumulation_steps: 2
  epochs: 1
  experiment_name: "200m_C_6p5e18_alpha0.400"
  optimizer:
    name: adamw
    lr: 1e-3
    weight_decay: 0.1
    betas: [0.9, 0.95]
  scheduler:
    name: cosine
    eta_min: 1e-4
    warmup_ratio: 0.05
  max_grad_norm: 1.0
  log_interval: 10
  num_workers: 8
  save_dir: "checkpoints"

data:
  txt_path: "/data/pretrain_v1_20b"
  pretrain_tokens: 2138008000
  eval_holdout: 2

tokenizer:
  name: "LanTokenizer"
  special_tokens: ["<bos>", "<eos>", "<pad>"]
  include_move_numbers: false

logging:
  backend: "wandb"
  entity: ""  # set your WandB entity here, or pass WANDB_ENTITY
  project: "chess-scaling-C_6p5e18"
  notes: "C=6.5e18 alpha=0.400 200m"
  tags: ["C_6p5e18", "alpha0.400", "200m"]
  mode: "online"
  hf_upload_repo: "chess-pre-to-post/200m_C_6p5e18_alpha0.400"
