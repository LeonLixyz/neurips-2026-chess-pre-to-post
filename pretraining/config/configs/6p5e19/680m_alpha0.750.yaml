# C_total=6.5e19, alpha=0.750
# Model: ~680m
# Pretrain tokens: 11,996,473,000 (10459 shards, 10457 train + 2 eval)
# Estimated steps: ~366,103

model:
  architecture: "Qwen/Qwen3-0.6B"
  block_size: 1024
  n_layer: 30
  n_head: 20
  num_key_value_heads: 4
  head_dim: 128
  n_embed: 1280
  intermediate_size: 3840
  dropout: 0.0

training:
  device: "cuda"
  batch_size: 32
  gradient_accumulation_steps: 2
  epochs: 1
  experiment_name: "680m_C_6p5e19_alpha0.750"
  optimizer:
    name: adamw
    lr: 1e-3
    weight_decay: 0.1
    betas: [0.9, 0.95]
  scheduler:
    name: cosine
    eta_min: 1e-4
    warmup_ratio: 0.05
  max_grad_norm: 1.0
  log_interval: 10
  num_workers: 8
  save_dir: "checkpoints"

data:
  txt_path: "/data/pretrain_v1_20b"
  pretrain_tokens: 11996473000
  eval_holdout: 2

tokenizer:
  name: "LanTokenizer"
  special_tokens: ["<bos>", "<eos>", "<pad>"]
  include_move_numbers: false

logging:
  backend: "wandb"
  entity: ""  # set your WandB entity here, or pass WANDB_ENTITY
  project: "chess-scaling-C_6p5e19"
  notes: "C=6.5e19 alpha=0.750 680m"
  tags: ["C_6p5e19", "alpha0.750", "680m"]
  mode: "online"
  hf_upload_repo: "chess-pre-to-post/680m_C_6p5e19_alpha0.750"
