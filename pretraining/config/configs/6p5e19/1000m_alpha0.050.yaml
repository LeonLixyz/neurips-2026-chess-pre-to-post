# C_total=6.5e19, alpha=0.050
# Model: ~1000m
# Pretrain tokens: 525,326,000 (458 shards, 456 train + 2 eval)
# Estimated steps: ~16,031

model:
  architecture: "Qwen/Qwen3-0.6B"
  block_size: 1024
  n_layer: 32
  n_head: 24
  num_key_value_heads: 4
  head_dim: 128
  n_embed: 1536
  intermediate_size: 4608
  dropout: 0.0

training:
  device: "cuda"
  batch_size: 32
  gradient_accumulation_steps: 2
  epochs: 1
  experiment_name: "1000m_C_6p5e19_alpha0.050"
  optimizer:
    name: adamw
    lr: 1e-3
    weight_decay: 0.1
    betas: [0.9, 0.95]
  scheduler:
    name: cosine
    eta_min: 1e-4
    warmup_ratio: 0.05
  max_grad_norm: 1.0
  log_interval: 10
  num_workers: 8
  save_dir: "checkpoints"

data:
  txt_path: "/data/pretrain_v1_20b"
  pretrain_tokens: 525326000
  eval_holdout: 2

tokenizer:
  name: "LanTokenizer"
  special_tokens: ["<bos>", "<eos>", "<pad>"]
  include_move_numbers: false

logging:
  backend: "wandb"
  entity: ""  # set your WandB entity here, or pass WANDB_ENTITY
  project: "chess-scaling-C_6p5e19"
  notes: "C=6.5e19 alpha=0.050 1000m"
  tags: ["C_6p5e19", "alpha0.050", "1000m"]
  mode: "online"
  hf_upload_repo: "chess-pre-to-post/1000m_C_6p5e19_alpha0.050"
